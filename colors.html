<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shot Timer MK1 — Color Config</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f0c;
    --panel: #161710;
    --border: #2a2d20;
    --accent: #7a9e3b;
    --accent2: #c8a84b;
    --text: #d4d8c8;
    --muted: #5a6050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header .brand {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #e8ecd8;
  }
  .header .sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* MAIN LAYOUT */
  .layout {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 960px;
  }

  /* ENCLOSURE SVG PREVIEW */
  .preview-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .preview-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  #enclosure-svg {
    width: 340px;
    height: 260px;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.7));
    transition: filter 0.3s;
  }

  /* COLOR SELECTOR PANEL */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    width: 340px;
  }

  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* PRESETS */
  .presets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }

  .preset-btn {
    position: relative;
    background: #1a1c14;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 10px 10px 44px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    background: #1f2216;
  }
  .preset-btn.active {
    border-color: var(--accent);
    background: #1f2216;
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .preset-btn .swatch-pair {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .preset-btn .sw {
    width: 22px;
    height: 10px;
    border-radius: 2px;
  }
  .preset-btn .pname {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #c8ccb8;
    text-transform: uppercase;
    display: block;
  }
  .preset-btn .pcode {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* CUSTOM PICKERS */
  .custom-section { margin-top: 4px; }
  .picker-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .picker-row label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
  }
  .picker-row .hex-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: 8px;
    flex: 1;
    text-align: right;
    padding-right: 8px;
  }
  input[type="color"] {
    -webkit-appearance: none;
    width: 36px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    background: none;
    padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

  /* HARDWARE COLOR */
  .hw-section { margin-top: 20px; }
  .hw-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .hw-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    background: #1a1c14;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 4px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .hw-btn:hover { border-color: var(--accent); }
  .hw-btn.active { border-color: var(--accent2); box-shadow: inset 0 0 0 1px var(--accent2); }
  .hw-btn .hw-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .hw-btn span {
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-align: center;
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* ACTIVE SCHEME DISPLAY */
  .scheme-name-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
  }
  .scheme-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
  }
  .scheme-code {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div style="position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(11,12,9,0.92); backdrop-filter:blur(12px); border-bottom:1px solid #252820; height:48px; display:flex; align-items:center; justify-content:space-between; padding:0 32px;">
  <a href="index.html" style="font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; color:#8ab840; text-decoration:none; text-transform:uppercase;">← Back to MK1</a>
  <span style="font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; color:#606858; text-transform:uppercase;">Color Configurator</span>
  <a href="index.html#order" style="font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px; color:#0b0c09; background:#8ab840; padding:6px 16px; border-radius:2px; text-decoration:none; font-weight:700; text-transform:uppercase;">Order — $75</a>
</div>
<div style="height:48px;"></div>

<div class="header">
  <div class="brand">Huckleberry Innovations</div>
  <h1>Shot Timer MK1</h1>
  <div class="sub">// COLOR CONFIG TERMINAL //</div>
</div>

<div class="layout">

  <!-- SVG PREVIEW -->
  <div class="preview-wrap">
    <div class="preview-label">Live Preview</div>
    <svg id="enclosure-svg" viewBox="0 0 340 260" xmlns="http://www.w3.org/2000/svg">
      <!-- DROP SHADOW DEF -->
      <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
          <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
        </filter>
        <linearGradient id="topSheen" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="black" stop-opacity="0.08"/>
        </linearGradient>
        <linearGradient id="bottomSheen" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="white" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
        </linearGradient>
      </defs>

      <!-- === BOTTOM SHELL === -->
      <rect id="bottom-shell" x="30" y="130" width="280" height="100" rx="10" ry="10" fill="#7a9e74" filter="url(#shadow)"/>
      <!-- bottom sheen -->
      <rect x="30" y="130" width="280" height="100" rx="10" ry="10" fill="url(#bottomSheen)"/>

      <!-- === TOP LID === -->
      <rect id="top-lid" x="30" y="30" width="280" height="108" rx="10" ry="10" fill="#d4c9a8" filter="url(#shadow)"/>
      <!-- top sheen -->
      <rect x="30" y="30" width="280" height="108" rx="10" ry="10" fill="url(#topSheen)"/>

      <!-- LID LABEL BORDER (decorative rect) -->
      <rect id="label-border" x="42" y="40" width="256" height="88" rx="6" ry="6" fill="none" stroke="#8a9e70" stroke-width="1.5" stroke-dasharray="none"/>

      <!-- BRAND TEXT on lid -->
      <text x="170" y="70" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-weight="700" font-size="14" letter-spacing="3" fill="#2a2e22" opacity="0.75">HUCKLEBERRY</text>
      <text x="170" y="88" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-weight="700" font-size="14" letter-spacing="3" fill="#2a2e22" opacity="0.75">INNOVATIONS</text>
      <text x="170" y="110" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="10" letter-spacing="4" fill="#2a2e22" opacity="0.6">SHOT TIMER MK1</text>

      <!-- OLED WINDOW on lid -->
      <rect x="52" y="44" width="46" height="36" rx="3" ry="3" fill="#0a0b08" stroke="#444" stroke-width="1"/>
      <!-- OLED screen glow -->
      <rect x="54" y="46" width="42" height="32" rx="2" ry="2" fill="#001a00" opacity="0.9"/>
      <!-- fake display text -->
      <text x="75" y="58" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="5" fill="#00ff88" opacity="0.9">0.000s</text>
      <text x="75" y="68" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="4" fill="#00cc66" opacity="0.7">READY</text>
      <text x="75" y="76" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="3.5" fill="#009944" opacity="0.5">PAR: 3.00s</text>

      <!-- === SIDE — LEFT FACE (visible) === -->
      <!-- TRRS jack hole -->
      <ellipse cx="30" cy="168" rx="5" ry="7" fill="#111" stroke="#333" stroke-width="1"/>
      <ellipse cx="30" cy="168" rx="2.5" ry="3.5" fill="#000"/>

      <!-- === FRONT FACE (bottom shell front) === -->

      <!-- USB-C port blocked -->
      <rect x="116" y="224" width="14" height="6" rx="1" fill="#222" stroke="#333" stroke-width="0.5"/>
      <!-- port plug -->
      <rect x="116" y="224" width="14" height="6" rx="1" fill="#555" opacity="0.6"/>

      <!-- === BOLTS — socket head cap screws === -->
      <!-- top-left -->
      <circle id="bolt-tl" cx="48" cy="138" r="5" fill="#1a1a1a"/>
      <circle cx="48" cy="138" r="3.2" fill="none" stroke="#444" stroke-width="0.8"/>
      <line x1="45.7" y1="138" x2="50.3" y2="138" stroke="#555" stroke-width="0.8"/>
      <line x1="48" y1="135.7" x2="48" y2="140.3" stroke="#555" stroke-width="0.8"/>
      <!-- top-right -->
      <circle id="bolt-tr" cx="292" cy="138" r="5" fill="#1a1a1a"/>
      <circle cx="292" cy="138" r="3.2" fill="none" stroke="#444" stroke-width="0.8"/>
      <line x1="289.7" y1="138" x2="294.3" y2="138" stroke="#555" stroke-width="0.8"/>
      <line x1="292" y1="135.7" x2="292" y2="140.3" stroke="#555" stroke-width="0.8"/>
      <!-- bottom-left -->
      <circle id="bolt-bl" cx="48" cy="222" r="5" fill="#1a1a1a"/>
      <circle cx="48" cy="222" r="3.2" fill="none" stroke="#444" stroke-width="0.8"/>
      <line x1="45.7" y1="222" x2="50.3" y2="222" stroke="#555" stroke-width="0.8"/>
      <line x1="48" y1="219.7" x2="48" y2="224.3" stroke="#555" stroke-width="0.8"/>
      <!-- bottom-right -->
      <circle id="bolt-br" cx="292" cy="222" r="5" fill="#1a1a1a"/>
      <circle cx="292" cy="222" r="3.2" fill="none" stroke="#444" stroke-width="0.8"/>
      <line x1="289.7" y1="222" x2="294.3" y2="222" stroke="#555" stroke-width="0.8"/>
      <line x1="292" y1="219.7" x2="292" y2="224.3" stroke="#555" stroke-width="0.8"/>

      <!-- BUTTONS row on front bottom face -->
      <!-- Red button -->
      <circle cx="160" cy="185" r="9" fill="#cc3322"/>
      <circle cx="160" cy="185" r="6.5" fill="#aa2211"/>
      <circle cx="158" cy="183" r="2" fill="rgba(255,255,255,0.15)"/>
      <!-- Green button -->
      <circle cx="195" cy="185" r="9" fill="#44aa44"/>
      <circle cx="195" cy="185" r="6.5" fill="#338833"/>
      <circle cx="193" cy="183" r="2" fill="rgba(255,255,255,0.15)"/>

      <!-- 9V battery label on side -->
      <rect x="70" y="154" width="60" height="18" rx="2" fill="rgba(0,0,0,0.2)"/>
      <text x="100" y="166" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.25)" letter-spacing="1">9V USB-C</text>

      <!-- LID / BOTTOM seam line -->
      <line x1="30" y1="132" x2="310" y2="132" stroke="rgba(0,0,0,0.35)" stroke-width="1.5"/>
    </svg>

    <div class="scheme-name-row" style="width:340px">
      <span class="scheme-badge" id="active-scheme-name">DESERT SAGE</span>
      <span class="scheme-code" id="active-scheme-code">SCHEME-01</span>
    </div>
  </div>

  <!-- CONTROL PANEL -->
  <div class="panel">
    <!-- PRESETS -->
    <div class="section-title">// Tactical Presets</div>
    <div class="presets-grid" id="presets-grid"></div>

    <div class="divider"></div>

    <!-- CUSTOM PICKERS -->
    <div class="custom-section">
      <div class="section-title">// Custom Override</div>
      <div class="picker-row">
        <label>Top Lid</label>
        <span class="hex-display" id="hex-top">#D4C9A8</span>
        <input type="color" id="pick-top" value="#D4C9A8">
      </div>
      <div class="picker-row">
        <label>Bottom Shell</label>
        <span class="hex-display" id="hex-bottom">#7A9E74</span>
        <input type="color" id="pick-bottom" value="#7A9E74">
      </div>
      <div class="picker-row">
        <label>Label Border</label>
        <span class="hex-display" id="hex-border">#8A9E70</span>
        <input type="color" id="pick-border" value="#8A9E70">
      </div>
    </div>

  </div>

</div>

<script>
  const PRESETS = [
    { name: "Desert Sage",   code: "SCHEME-01", lid: "#D4C9A8", shell: "#7A9E74", border: "#8A9E70" },
    { name: "Flat Dark",     code: "SCHEME-02", lid: "#3a3d36", shell: "#1e2018", border: "#4a4e44" },
    { name: "Coyote OD",     code: "SCHEME-03", lid: "#C4A26A", shell: "#5a6a42", border: "#7a8a55" },
    { name: "Ranger Green",  code: "SCHEME-04", lid: "#4a5a40", shell: "#2e3828", border: "#6a7a58" },
    { name: "Foliage",       code: "SCHEME-05", lid: "#8a9e78", shell: "#4e6040", border: "#aabf90" },
    { name: "Urban Grey",    code: "SCHEME-06", lid: "#909088", shell: "#4a4a48", border: "#b0b0a8" },
    { name: "Multicam Arid", code: "SCHEME-07", lid: "#C8A878", shell: "#8a7a58", border: "#dac090" },
    { name: "Night Ops",     code: "SCHEME-08", lid: "#1a1a18", shell: "#0a0a08", border: "#2a3020" },
    { name: "FDE / Tan",     code: "SCHEME-09", lid: "#C8A870", shell: "#9a8060", border: "#dac090" },
    { name: "Stealth BLK",  code: "SCHEME-10", lid: "#252520", shell: "#141410", border: "#3a3a30" },
  ];

  let currentPreset = 0;

  // Build presets
  const grid = document.getElementById("presets-grid");
  PRESETS.forEach((p, i) => {
    const btn = document.createElement("button");
    btn.className = "preset-btn" + (i === 0 ? " active" : "");
    btn.innerHTML = `
      <div class="swatch-pair">
        <div class="sw" style="background:${p.lid}"></div>
        <div class="sw" style="background:${p.shell}"></div>
      </div>
      <span class="pname">${p.name}</span>
      <span class="pcode">${p.code}</span>
    `;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentPreset = i;
      applyColors(p.lid, p.shell, p.border);
      document.getElementById("pick-top").value = p.lid;
      document.getElementById("pick-bottom").value = p.shell;
      document.getElementById("pick-border").value = p.border;
      document.getElementById("active-scheme-name").textContent = p.name.toUpperCase();
      document.getElementById("active-scheme-code").textContent = p.code;
    });
    grid.appendChild(btn);
  });


  function applyColors(lid, shell, border) {
    document.getElementById("top-lid").setAttribute("fill", lid);
    document.getElementById("bottom-shell").setAttribute("fill", shell);
    document.getElementById("label-border").setAttribute("stroke", border);
    document.getElementById("hex-top").textContent = lid.toUpperCase();
    document.getElementById("hex-bottom").textContent = shell.toUpperCase();
    document.getElementById("hex-border").textContent = border.toUpperCase();

    // Adapt text contrast
    const isDarkLid = isColorDark(lid);
    const textFill = isDarkLid ? "rgba(255,255,255,0.65)" : "rgba(30,34,22,0.75)";
    document.querySelectorAll("#enclosure-svg text").forEach(t => {
      if (!t.closest("[id^='oled']")) {
        const small = parseFloat(t.getAttribute("font-size")) < 8;
        if (!small) t.setAttribute("fill", textFill);
      }
    });
  }


  function isColorDark(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return (r*0.299 + g*0.587 + b*0.114) < 140;
  }

  // Custom pickers
  document.getElementById("pick-top").addEventListener("input", e => {
    const v = e.target.value;
    document.getElementById("top-lid").setAttribute("fill", v);
    document.getElementById("hex-top").textContent = v.toUpperCase();
  });
  document.getElementById("pick-bottom").addEventListener("input", e => {
    const v = e.target.value;
    document.getElementById("bottom-shell").setAttribute("fill", v);
    document.getElementById("hex-bottom").textContent = v.toUpperCase();
  });
  document.getElementById("pick-border").addEventListener("input", e => {
    const v = e.target.value;
    document.getElementById("label-border").setAttribute("stroke", v);
    document.getElementById("hex-border").textContent = v.toUpperCase();
  });

  // Init
  applyColors(PRESETS[0].lid, PRESETS[0].shell, PRESETS[0].border);
</script>
</body>
</html>
