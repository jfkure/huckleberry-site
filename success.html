<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Received — Huckleberry Innovations</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230b0c09'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%238ab840' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%238ab840'/%3E%3Cline x1='16' y1='4' x2='16' y2='11' stroke='%238ab840' stroke-width='1.5'/%3E%3Cline x1='16' y1='21' x2='16' y2='28' stroke='%238ab840' stroke-width='1.5'/%3E%3Cline x1='4' y1='16' x2='11' y2='16' stroke='%238ab840' stroke-width='1.5'/%3E%3Cline x1='21' y1='16' x2='28' y2='16' stroke='%238ab840' stroke-width='1.5'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0c09;--accent:#8ab840;--accent2:#c8a840;--text:#d0d4c0;--muted:#606858;--border:#252820;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;}
  .wrap{max-width:480px;}
  .icon{font-size:48px;margin-bottom:24px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:6px;color:#e8ecd8;line-height:1;margin-bottom:16px;}
  h1 span{color:var(--accent);display:block;}
  p{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:32px;}
  .mono{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--accent2);margin-bottom:32px;display:block;}
  a{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#0b0c09;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:14px 32px;border-radius:2px;text-decoration:none;}
  a:hover{background:#a0d050;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🎯</div>
  <h1>Order<span>Received</span></h1>
  <span class="mono">// TRANSMISSION CONFIRMED</span>
  <p>Your order request has been received. We'll be in touch shortly to confirm details.</p>
  <a href="/">← Back To Site</a>
</div>
</body>
</html>
